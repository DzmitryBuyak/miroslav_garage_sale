<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin — {% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body style="background:#f5f5f5;">
<nav class="admin-nav">
    <span class="logo">🧸 Admin</span>
    <a href="/admin/items" {% if active == 'items' %}class="active"{% endif %}>Items</a>
    <a href="/admin/orders" {% if active == 'orders' %}class="active"{% endif %}>Orders</a>
    <a href="/" target="_blank">View site ↗</a>
    <a href="/admin/logout" style="margin-left:auto;color:#888;">Logout</a>
</nav>
<div class="admin-body">
    {% block content %}{% endblock %}
</div>
</body>
</html>
